<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .breathe-anim {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }
      .body-sway {
        transform-origin: 7.5px 6px;
        animation: sway 1.2s infinite alternate ease-in-out;
      }
      .leg-dangle-1 {
        animation: dangle-1 0.5s infinite linear;
        transform-origin: top center;
        transform-box: fill-box;
      }
      .leg-dangle-2 {
        animation: dangle-2 0.5s infinite linear;
        transform-origin: top center;
        transform-box: fill-box;
      }
      .arm-flail-l {
        transform-box: fill-box;
        transform-origin: 100% 50%;
        animation: flail-l 0.2s infinite alternate ease-in-out;
      }
      .arm-flail-r {
        transform-box: fill-box;
        transform-origin: 0% 50%;
        animation: flail-r 0.2s infinite alternate ease-in-out;
      }
      .shadow-lift {
        transform-origin: 7.5px 15.5px;
        animation: shadow-pulse 1.2s infinite alternate ease-in-out;
      }
      #eyes-js, #body-js, #shadow-js {
        transition: transform 0.2s ease-out;
      }
      #shadow-js {
        transform-origin: 7.5px 15px;
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }
      @keyframes sway {
        0%   { transform: rotate(-3deg) translate(-1px, 0); }
        100% { transform: rotate(3deg) translate(1px, 0); }
      }
      @keyframes dangle-1 {
        0%, 100% { transform: rotate(0deg) scaleY(1); }
        50%      { transform: rotate(-25deg) scaleY(0.7); }
      }
      @keyframes dangle-2 {
        0%, 100% { transform: rotate(-25deg) scaleY(0.7); }
        50%      { transform: rotate(0deg) scaleY(1); }
      }
      @keyframes flail-l {
        0%   { transform: rotate(45deg); }
        100% { transform: rotate(85deg); }
      }
      @keyframes flail-r {
        0%   { transform: rotate(-45deg); }
        100% { transform: rotate(-85deg); }
      }
      @keyframes shadow-pulse {
        0%   { transform: scale(0.7); opacity: 0.2; }
        100% { transform: scale(0.8); opacity: 0.3; }
      }
    </style>
  </defs>

  <!-- Shadow -->
  <g id="shadow-js">
    <rect class="shadow-lift" x="3" y="15" width="9" height="1" fill="#000000"/>
  </g>

  <!-- Body -->
  <g id="body-js" class="body-sway">
    <g class="breathe-anim">

      <!-- Tail -->
      <rect x="1" y="7" width="2" height="5" fill="#C46A0A"/>
      <rect x="-1" y="7" width="2" height="5" fill="#C46A0A"/>
      <rect x="0" y="8" width="3" height="5" fill="#C46A0A"/>
      <rect x="-1" y="6" width="2" height="3" fill="#FAEBD7"/>

      <!-- Left Ear -->
      <rect x="3" y="4" width="1" height="2" fill="#E8710A"/>
      <rect x="4" y="4.5" width="1" height="2" fill="#E8710A"/>
      <rect x="5" y="5" width="1.3" height="1" fill="#E8710A"/>
      <polygon points="3,4 4,3 6.5,6" fill="#E8710A"/>
      <polygon points="4,6 4,4.5 5,6" fill="#FAEBD7"/>

      <!-- Right Ear -->
      <rect x="9" y="5" width="1" height="1" fill="#E8710A"/>
      <rect x="10" y="3" width="1" height="3" fill="#E8710A"/>
      <rect x="11" y="4" width="1" height="2" fill="#E8710A"/>
      <polygon points="11,3 11,4 12,4" fill="#E8710A"/>
      <polygon points="8,6 10,6 10,3" fill="#E8710A"/>
      <polygon points="11,4 12,4 11,5" fill="#E8710A"/>
      <polygon points="10,6 11,6 10.5,4" fill="#FAEBD7"/>

      <!-- Torso -->
      <rect x="3" y="6" width="9" height="7" fill="#E8710A"/>

      <!-- Dangling Legs -->
      <rect class="leg-dangle-1" x="4" y="13" width="2" height="2" fill="#E8710A"/>
      <rect class="leg-dangle-2" x="9" y="13" width="2" height="2" fill="#E8710A"/>

      <!-- Flailing Arms -->
      <g class="arm-flail-l">
        <rect x="1" y="9" width="2" height="2" fill="#E8710A"/>
      </g>
      <g class="arm-flail-r">
        <rect x="12" y="9" width="2" height="2" fill="#E8710A"/>
      </g>

      <!-- Eyes (anime squint) -->
      <g id="eyes-js">
        <g fill="none" stroke="#000000" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="5,8 6.5,9 5,10"/>
          <polyline points="11,8 9.5,9 11,10"/>
        </g>
      </g>

    </g>
  </g>
</svg>
