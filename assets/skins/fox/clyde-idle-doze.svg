<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* Dozing — looping gentle breathing in yawn-end squashed pose, eyes shut */
      .doze-body {
        transform-origin: 7.5px 13px;
        animation: doze-breathe 4s infinite ease-in-out;
      }

      .doze-shadow {
        transform-origin: 7.5px 15.5px;
        animation: doze-shadow 4s infinite ease-in-out;
      }

      .eyes-shut {
        transform-origin: 7.5px 9px;
        transform: scaleY(0.1);
        transition: transform 0.3s ease-out;
      }

      .arm-l-doze {
        transform-origin: 1px 10px;
        transform: translate(0px, 1px) rotate(-15deg);
      }

      .arm-r-doze {
        transform-origin: 14px 10px;
        transform: translate(0px, 1px) rotate(15deg);
      }

      .breathe-anim {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }

      #eyes-js, #body-js, #shadow-js {
        transition: transform 0.2s ease-out;
      }

      #shadow-js {
        transform-origin: 7.5px 15px;
      }

      @keyframes doze-breathe {
        0%, 100% { transform: scale(1.05, 0.95) translate(0, 1px); }
        50% { transform: scale(1.08, 0.92) translate(0, 1.8px); }
      }

      @keyframes doze-shadow {
        0%, 100% { transform: scaleX(1.05); opacity: 0.55; }
        50% { transform: scaleX(1.08); opacity: 0.5; }
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }
    </style>
  </defs>

  <!-- Ground Shadow -->
  <g id="shadow-js">
    <rect class="doze-shadow" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.55"/>
  </g>

  <!-- Static Legs -->
  <g id="legs" fill="#E8710A">
    <rect x="4" y="13" width="2" height="2"/>
    <rect x="9" y="13" width="2" height="2"/>
  </g>

  <!-- Dozing Body (squashed yawn-end pose + gentle breathing) -->
  <g id="body-js" class="doze-body">
    <g class="breathe-anim">

      <!-- Tail -->
      <rect x="1" y="7" width="2" height="5" fill="#C46A0A"/>
      <rect x="-1" y="7" width="2" height="5" fill="#C46A0A"/>
      <rect x="0" y="8" width="3" height="5" fill="#C46A0A"/>
      <rect x="-1" y="6" width="2" height="3" fill="#FAEBD7"/>

      <!-- Left Ear -->
      <rect x="3" y="4" width="1" height="2" fill="#E8710A"/>
      <rect x="4" y="4.5" width="1" height="2" fill="#E8710A"/>
      <rect x="5" y="5" width="1.3" height="1" fill="#E8710A"/>
      <polygon points="3,4 4,3 6.5,6" fill="#E8710A"/>
      <polygon points="4,6 4,4.5 5,6" fill="#FAEBD7"/>

      <!-- Right Ear -->
      <rect x="9" y="5" width="1" height="1" fill="#E8710A"/>
      <rect x="10" y="3" width="1" height="3" fill="#E8710A"/>
      <rect x="11" y="4" width="1" height="2" fill="#E8710A"/>
      <polygon points="11,3 11,4 12,4" fill="#E8710A"/>
      <polygon points="8,6 10,6 10,3" fill="#E8710A"/>
      <polygon points="11,4 12,4 11,5" fill="#E8710A"/>
      <polygon points="10,6 11,6 10.5,4" fill="#FAEBD7"/>

      <!-- Torso -->
      <rect x="3" y="6" width="9" height="7" fill="#E8710A"/>
      <!-- Left Arm (relaxed down) -->
      <g class="arm-l-doze">
        <rect x="1" y="9" width="2" height="2" fill="#E8710A"/>
      </g>
      <!-- Right Arm (relaxed down) -->
      <g class="arm-r-doze">
        <rect x="12" y="9" width="2" height="2" fill="#E8710A"/>
      </g>
      <!-- Eyes shut (JS can open via style.transform override) -->
      <g id="eyes-js" class="eyes-shut" fill="#000000">
        <rect x="5" y="8" width="1" height="2"/>
        <rect x="10" y="8" width="1" height="2"/>
      </g>

    </g>
  </g>
</svg>
