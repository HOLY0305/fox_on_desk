<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* Slow, contemplative swaying */
      .body-sway {
        transform-origin: 7.5px 15px;
        animation: sway 4s infinite ease-in-out;
      }
      /* Ground shadow shifting with the sway */
      .shadow-sway {
        transform-origin: 7.5px 15.5px;
        animation: shadow-shift 4s infinite ease-in-out;
      }
      /* Right arm raised and tapping the "chin" */
      .arm-tap {
        transform-origin: 14px 10px;
        animation: tap-chin 0.8s infinite alternate ease-in-out;
      }
      /* Slow, thoughtful blinking */
      .eyes-think {
        transform-origin: 7.5px 7px;
        animation: blink-think 4s infinite;
      }
      /* Loading dots appearing sequentially */
      .dot { opacity: 0; }
      .d1 { animation: load-dot-1 2s infinite; }
      .d2 { animation: load-dot-2 2s infinite; }
      .d3 { animation: load-dot-3 2s infinite; }
      .breathe-anim {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }
      #eyes-js, #body-js, #shadow-js {
        transition: transform 0.2s ease-out;
      }
      #shadow-js {
        transform-origin: 7.5px 15px;
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }
      @keyframes sway {
        0%, 100% { transform: rotate(0deg) translate(0, 0); }
        25% { transform: rotate(-3deg) translate(-1px, 0); }
        75% { transform: rotate(3deg) translate(1px, 0); }
      }
      @keyframes shadow-shift {
        0%, 100% { transform: translate(0, 0); }
        25% { transform: translate(-1px, 0); }
        75% { transform: translate(1px, 0); }
      }
      @keyframes tap-chin {
        0% { transform: rotate(-125deg); }
        100% { transform: rotate(-145deg); }
      }
      @keyframes blink-think {
        0%, 46%, 54%, 100% { transform: scaleY(1); }
        50% { transform: scaleY(0.1); }
      }
      @keyframes load-dot-1 {
        0%, 20% { opacity: 0; }
        21%, 100% { opacity: 1; }
      }
      @keyframes load-dot-2 {
        0%, 40% { opacity: 0; }
        41%, 100% { opacity: 1; }
      }
      @keyframes load-dot-3 {
        0%, 60% { opacity: 0; }
        61%, 100% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Pixel-Art Thinking Bubble -->
  <g transform="translate(-3, -7)">
    <g class="think-bubble">
      <g fill="#FFFFFF" opacity="0.9">
        <rect x="2" y="1" width="8" height="7"/>
        <rect x="1" y="2" width="10" height="5"/>
        <rect x="3" y="0" width="6" height="9"/>
        <rect x="8" y="7" width="2" height="2"/>
        <rect x="10" y="9" width="1" height="1"/>
      </g>
      <g fill="#0082FC">
        <rect class="dot d1" x="2.5" y="4" width="1" height="1"/>
        <rect class="dot d2" x="5.5" y="4" width="1" height="1"/>
        <rect class="dot d3" x="8.5" y="4" width="1" height="1"/>
      </g>
    </g>
  </g>

  <!-- Mirrored Character Body -->
  <g transform="translate(15, 0) scale(-1, 1)">
    <g id="shadow-js">
      <rect class="shadow-sway" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>
    </g>

    <g id="body-js">
      <g class="body-sway">
        <g class="breathe-anim">

          <!-- Tail -->
          <rect x="1" y="7" width="2" height="5" fill="#C46A0A"/>
          <rect x="-1" y="7" width="2" height="5" fill="#C46A0A"/>
          <rect x="0" y="8" width="3" height="5" fill="#C46A0A"/>
          <rect x="-1" y="6" width="2" height="3" fill="#FAEBD7"/>

          <!-- Left Ear -->
          <rect x="3" y="4" width="1" height="2" fill="#E8710A"/>
          <rect x="4" y="4.5" width="1" height="2" fill="#E8710A"/>
          <rect x="5" y="5" width="1.3" height="1" fill="#E8710A"/>
          <polygon points="3,4 4,3 6.5,6" fill="#E8710A"/>
          <polygon points="4,6 4,4.5 5,6" fill="#FAEBD7"/>

          <!-- Right Ear -->
          <rect x="9" y="5" width="1" height="1" fill="#E8710A"/>
          <rect x="10" y="3" width="1" height="3" fill="#E8710A"/>
          <rect x="11" y="4" width="1" height="2" fill="#E8710A"/>
          <polygon points="11,3 11,4 12,4" fill="#E8710A"/>
          <polygon points="8,6 10,6 10,3" fill="#E8710A"/>
          <polygon points="11,4 12,4 11,5" fill="#E8710A"/>
          <polygon points="10,6 11,6 10.5,4" fill="#FAEBD7"/>

          <!-- Body (fox) -->
          <rect x="3" y="6" width="9" height="7" fill="#E8710A"/>

          <!-- Arms -->
          <rect x="1" y="9" width="2" height="2" fill="#E8710A" transform="rotate(25 1 10)"/>
          <g class="arm-tap">
            <rect x="12" y="9" width="2" height="2" fill="#E8710A"/>
          </g>

          <!-- Legs -->
          <rect x="4" y="13" width="2" height="2" fill="#E8710A"/>
          <rect x="9" y="13" width="2" height="2" fill="#E8710A"/>

          <!-- Eyes -->
          <g id="eyes-js" fill="#000000">
            <g class="eyes-think">
              <rect x="5" y="7" width="1" height="2"/>
              <rect x="10" y="7" width="1" height="2"/>
            </g>
          </g>

        </g>
      </g>
    </g>
  </g>
</svg>
