<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .body-magic {
        transform-origin: 7.5px 15px;
        animation: float-body 3s infinite ease-in-out;
      }
      .arm-wand {
        transform-origin: 14px 10px;
        animation: wave-wand 3s infinite ease-in-out;
      }
      .arm-l-magic {
        transform-origin: 1px 10px;
        animation: wave-magic 3s infinite ease-in-out;
      }
      .eyes-magic {
        animation: blink-magic 3s infinite;
      }
      .magic-star {
        opacity: 0;
        animation: sparkle-magic 2s infinite ease-out;
      }
      .s1 { animation-delay: 0s; fill: #FFD700; }
      .s2 { animation-delay: 0.5s; fill: #40C4FF; }
      .s3 { animation-delay: 1s; fill: #B388FF; }
      .s4 { animation-delay: 1.5s; fill: #FF8A80; }
      .breathe-anim {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }
      #eyes-js, #body-js, #shadow-js {
        transition: transform 0.2s ease-out;
      }
      #shadow-js {
        transform-origin: 7.5px 15px;
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }
      @keyframes float-body {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-2px); }
      }
      @keyframes wave-wand {
        0%, 100% { transform: rotate(-20deg); }
        50% { transform: rotate(-120deg); }
      }
      @keyframes wave-magic {
        0%, 100% { transform: rotate(20deg); }
        50% { transform: rotate(120deg); }
      }
      @keyframes blink-magic {
        0%, 40% { transform: scaleY(0.1); }
        45%, 95% { transform: scaleY(1); }
        100% { transform: scaleY(0.1); }
      }
      @keyframes sparkle-magic {
        0% { transform: translate(14px, 4px) scale(0) rotate(0deg); opacity: 0; }
        20% { opacity: 1; }
        100% { transform: translate(14px, -15px) scale(1.5) rotate(180deg); opacity: 0; }
      }
    </style>
    <g id="star">
      <polygon points="0,-2 0.5,-0.5 2,0 0.5,0.5 0,2 -0.5,0.5 -2,0 -0.5,-0.5"/>
    </g>
  </defs>

  <g id="shadow-js">
    <rect x="3" y="15" width="9" height="1" fill="#000000" opacity="0.4"/>
  </g>

  <!-- Magic Stars -->
  <g>
    <use href="#star" class="magic-star s1"/>
    <use href="#star" class="magic-star s2" transform="translate(-10, 0)"/>
    <use href="#star" class="magic-star s3" transform="translate(5, -5)"/>
    <use href="#star" class="magic-star s4" transform="translate(-5, -10)"/>
  </g>

  <g id="body-js">
    <g class="body-magic">
      <g class="breathe-anim">

        <!-- Tail -->
        <rect x="1" y="7" width="2" height="5" fill="#C46A0A"/>
        <rect x="-1" y="7" width="2" height="5" fill="#C46A0A"/>
        <rect x="0" y="8" width="3" height="5" fill="#C46A0A"/>
        <rect x="-1" y="6" width="2" height="3" fill="#FAEBD7"/>

        <!-- Left Ear -->
        <rect x="3" y="4" width="1" height="2" fill="#E8710A"/>
        <rect x="4" y="4.5" width="1" height="2" fill="#E8710A"/>
        <rect x="5" y="5" width="1.3" height="1" fill="#E8710A"/>
        <polygon points="3,4 4,3 6.5,6" fill="#E8710A"/>
        <polygon points="4,6 4,4.5 5,6" fill="#FAEBD7"/>

        <!-- Right Ear -->
        <rect x="9" y="5" width="1" height="1" fill="#E8710A"/>
        <rect x="10" y="3" width="1" height="3" fill="#E8710A"/>
        <rect x="11" y="4" width="1" height="2" fill="#E8710A"/>
        <polygon points="11,3 11,4 12,4" fill="#E8710A"/>
        <polygon points="8,6 10,6 10,3" fill="#E8710A"/>
        <polygon points="11,4 12,4 11,5" fill="#E8710A"/>
        <polygon points="10,6 11,6 10.5,4" fill="#FAEBD7"/>

        <!-- Body (fox) -->
        <rect x="3" y="6" width="9" height="7" fill="#E8710A"/>

        <!-- Arms -->
        <g class="arm-l-magic"><rect x="1" y="9" width="2" height="2" fill="#E8710A"/></g>

        <!-- Legs -->
        <rect x="3.5" y="13" width="4" height="1" fill="#E8710A"/>
        <rect x="8" y="13" width="3" height="1" fill="#E8710A"/>

        <!-- Eyes -->
        <g id="eyes-js" fill="#000000" class="eyes-magic" transform-origin="7.5px 9px">
          <rect x="5" y="8" width="1" height="2"/>
          <rect x="10" y="8" width="1" height="2"/>
        </g>

        <!-- Wizard Hat -->
        <g transform="translate(7.5, 6)">
          <polygon points="-4,0 4,0 0,-6" fill="#673AB7"/>
          <rect x="-5" y="0" width="10" height="1" fill="#512DA8"/>
          <polygon points="0,-3 0.5,-2.5 1.5,-2.5 0.75,-1.75 1,-0.5 0,-1.25 -1,-0.5 -0.75,-1.75 -1.5,-2.5 -0.5,-2.5" fill="#FFC107"/>
        </g>

        <!-- Wand arm -->
        <g class="arm-wand" fill="#E8710A">
          <rect x="12" y="9" width="2" height="2"/>
          <rect x="13.5" y="4" width="1" height="6" fill="#8D6E63"/>
          <rect x="13.5" y="4" width="1" height="1" fill="#FFD700"/>
        </g>

      </g>
    </g>
  </g>
</svg>
