<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .body-react {
        transform-origin: 7.5px 15px;
        animation: body-look-r 2.5s 1 ease-in-out forwards;
      }
      .eyes-react {
        animation: eyes-look-r 2.5s 1 ease-in-out forwards;
      }
      .eyes-blink {
        transform-origin: 7.5px 9px;
        animation: blink 3s infinite linear;
      }
      .question-pop {
        transform-origin: center;
        animation: question-r 2.5s 1 ease-in-out forwards;
        opacity: 0;
      }
      .arm-r-react {
        animation: arm-r-return 2.5s 1 ease-in-out forwards;
      }
      .breathe-anim {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }
      #eyes-js, #body-js, #shadow-js {
        transition: transform 0.2s ease-out;
      }
      #shadow-js {
        transform-origin: 7.5px 15px;
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }
      @keyframes arm-r-return {
        0%, 8%   { transform: none; }
        16%, 56% { transform: translate(1px, -2px) rotate(-15deg); }
        84%, 100%{ transform: none; }
      }
      @keyframes body-look-r {
        0%, 8%   { transform: translate(0px, 0px); }
        16%, 56% { transform: translate(2px, 0px) rotate(2deg); }
        84%, 100%{ transform: translate(0px, 0px); }
      }
      @keyframes eyes-look-r {
        0%, 8%   { transform: translate(0px, 0px); }
        16%, 56% { transform: translate(3px, 0px); }
        84%, 100%{ transform: translate(0px, 0px); }
      }
      @keyframes blink {
        0%, 13%, 17%, 80%, 84%, 100% { transform: scaleY(1); }
        15%, 82% { transform: scaleY(0.1); }
      }
      @keyframes question-r {
        0%, 12%  { opacity: 0; transform: translate(6px, 6px) scale(0.5); }
        22%, 48% { opacity: 1; transform: translate(8px, -2px) scale(1); }
        64%, 100%{ opacity: 0; transform: translate(8px, -8px) scale(1.2); }
      }
    </style>

    <g id="pixel-question">
      <rect x="1" y="0" width="2" height="1"/>
      <rect x="0" y="1" width="1" height="1"/>
      <rect x="3" y="1" width="1" height="2"/>
      <rect x="2" y="3" width="1" height="1"/>
      <rect x="1" y="4" width="1" height="1"/>
      <rect x="1" y="6" width="1" height="1"/>
    </g>
  </defs>

  <!-- Ground Shadow -->
  <g id="shadow-js">
    <rect x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>
  </g>

  <!-- Animated Upper Body -->
  <g id="body-js" class="body-react">
    <g class="breathe-anim">

      <!-- Tail -->
      <rect x="1" y="7" width="2" height="5" fill="#C46A0A"/>
      <rect x="-1" y="7" width="2" height="5" fill="#C46A0A"/>
      <rect x="0" y="8" width="3" height="5" fill="#C46A0A"/>
      <rect x="-1" y="6" width="2" height="3" fill="#FAEBD7"/>

      <!-- Left Ear -->
      <rect x="3" y="4" width="1" height="2" fill="#E8710A"/>
      <rect x="4" y="4.5" width="1" height="2" fill="#E8710A"/>
      <rect x="5" y="5" width="1.3" height="1" fill="#E8710A"/>
      <polygon points="3,4 4,3 6.5,6" fill="#E8710A"/>
      <polygon points="4,6 4,4.5 5,6" fill="#FAEBD7"/>

      <!-- Right Ear -->
      <rect x="9" y="5" width="1" height="1" fill="#E8710A"/>
      <rect x="10" y="3" width="1" height="3" fill="#E8710A"/>
      <rect x="11" y="4" width="1" height="2" fill="#E8710A"/>
      <polygon points="11,3 11,4 12,4" fill="#E8710A"/>
      <polygon points="8,6 10,6 10,3" fill="#E8710A"/>
      <polygon points="11,4 12,4 11,5" fill="#E8710A"/>
      <polygon points="10,6 11,6 10.5,4" fill="#FAEBD7"/>

      <!-- Body -->
      <rect x="3" y="6" width="9" height="7" fill="#E8710A"/>

      <!-- Arms -->
      <rect x="1" y="9" width="2" height="2" fill="#E8710A"/>
      <g class="arm-r-react">
        <rect x="12" y="9" width="2" height="2" fill="#E8710A"/>
      </g>

      <!-- Legs -->
      <rect x="4" y="13" width="2" height="2" fill="#E8710A"/>
      <rect x="9" y="13" width="2" height="2" fill="#E8710A"/>

      <!-- Eyes -->
      <g id="eyes-js" class="eyes-react" fill="#000000">
        <g class="eyes-blink">
          <rect x="5" y="8" width="1" height="2"/>
          <rect x="10" y="8" width="1" height="2"/>
        </g>
      </g>

    </g>
  </g>

  <!-- Right Question Mark -->
  <g class="question-pop" fill="#FFC107" transform="translate(10, 0)">
    <use href="#pixel-question" />
  </g>
</svg>
