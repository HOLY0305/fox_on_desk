<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .body-rock {
        transform-origin: 7.5px 15px;
        animation: rock 0.6s infinite alternate ease-in-out;
      }
      .arm-juggle-l {
        transform-origin: 1px 10px;
        animation: arm-jl 0.6s infinite alternate ease-in-out;
      }
      .arm-juggle-r {
        transform-origin: 14px 10px;
        animation: arm-jr 0.6s infinite alternate ease-in-out;
      }
      .eyes-dart {
        animation: dart 1.2s infinite;
      }
      .packet {
        animation: juggle 1.2s infinite linear;
      }
      .p1 { animation-delay: 0s; fill: #FF5252; }
      .p2 { animation-delay: -0.4s; fill: #FFC107; }
      .p3 { animation-delay: -0.8s; fill: #4CAF50; }
      
      @keyframes rock {
        0% { transform: rotate(-5deg); }
        100% { transform: rotate(5deg); }
      }
      @keyframes arm-jl {
        0% { transform: rotate(60deg); }
        100% { transform: rotate(10deg); }
      }
      @keyframes arm-jr {
        0% { transform: rotate(-10deg); }
        100% { transform: rotate(-60deg); }
      }
      @keyframes dart {
        0%, 100% { transform: translate(-2px, -2px); }
        25% { transform: translate(0, -3px); }
        50% { transform: translate(2px, -2px); }
        75% { transform: translate(0, 0); }
      }
      @keyframes juggle {
        0% { transform: translate(0px, 9px) rotate(0deg); }
        25% { transform: translate(8px, 0px) rotate(90deg); }
        50% { transform: translate(15px, 9px) rotate(180deg); }
        75% { transform: translate(8px, 4px) rotate(270deg); }
        100% { transform: translate(0px, 9px) rotate(360deg); }
      }

      .breathe-anim {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }
      #eyes-js, #body-js, #shadow-js {
        transition: transform 0.2s ease-out;
      }
      #shadow-js {
        transform-origin: 7.5px 15px;
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }
    </style>
  </defs>

  <g id="shadow-js">
    <rect id="ground-shadow" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>
  </g>

  <!-- Juggling Packets -->
  <g class="packets">
    <rect class="packet p1" x="-1" y="-1" width="2" height="2" />
    <rect class="packet p2" x="-1" y="-1" width="2" height="2" />
    <rect class="packet p3" x="-1" y="-1" width="2" height="2" />
  </g>

  <g id="body-js" class="body-rock">
    <g class="breathe-anim">

      <!-- Tail -->
      <rect x="1" y="7" width="2" height="5" fill="#C46A0A"/>
      <rect x="-1" y="7" width="2" height="5" fill="#C46A0A"/>
      <rect x="0" y="8" width="3" height="5" fill="#C46A0A"/>
      <rect x="-1" y="6" width="2" height="3" fill="#FAEBD7"/>

      <!-- Left Ear -->
      <rect x="3" y="4" width="1" height="2" fill="#E8710A"/>
      <rect x="4" y="4.5" width="1" height="2" fill="#E8710A"/>
      <rect x="5" y="5" width="1.3" height="1" fill="#E8710A"/>
      <polygon points="3,4 4,3 6.5,6" fill="#E8710A"/>
      <polygon points="4,6 4,4.5 5,6" fill="#FAEBD7"/>

      <!-- Right Ear -->
      <rect x="9" y="5" width="1" height="1" fill="#E8710A"/>
      <rect x="10" y="3" width="1" height="3" fill="#E8710A"/>
      <rect x="11" y="4" width="1" height="2" fill="#E8710A"/>
      <polygon points="11,3 11,4 12,4" fill="#E8710A"/>
      <polygon points="8,6 10,6 10,3" fill="#E8710A"/>
      <polygon points="11,4 12,4 11,5" fill="#E8710A"/>
      <polygon points="10,6 11,6 10.5,4" fill="#FAEBD7"/>

      <g id="body-color-group" fill="#E8710A">
        <rect x="4" y="13" width="2" height="2"/>
        <rect x="9" y="13" width="2" height="2"/>
        <rect x="3" y="6" width="9" height="7"/>
        <g class="arm-juggle-l"><rect x="1" y="9" width="2" height="2"/></g>
        <g class="arm-juggle-r"><rect x="12" y="9" width="2" height="2"/></g>
      </g>

      <g id="eyes-js" class="eyes-dart" fill="#000000">
        <rect x="5" y="8" width="1" height="2"/>
        <rect x="10" y="8" width="1" height="2"/>
      </g>

    </g>
  </g>
</svg>