<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .body-sweep {
        transform-origin: 7.5px 15px;
        animation: sweep-lean 1.5s infinite ease-in-out;
      }
      .arm-sweep {
        transform-origin: 14px 10px;
        animation: sweep-arm 1.5s infinite ease-in-out;
      }
      .broom {
        transform-origin: 13.5px 14px;
        animation: sweep-broom 1.5s infinite ease-in-out;
      }
      .dust {
        opacity: 0;
        animation: sweep-dust 1.5s infinite ease-out;
      }
      .d1 { animation-delay: 0.2s; }
      .d2 { animation-delay: 0.4s; }
      .eyes-blink {
        transform-origin: 7.5px 9px;
        animation: eye-blink 4s infinite ease-in-out;
      }
      .breathe-anim {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }
      #eyes-js, #body-js, #shadow-js {
        transition: transform 0.2s ease-out;
      }
      #shadow-js {
        transform-origin: 7.5px 15px;
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }
      @keyframes eye-blink {
        0%, 10%, 100% { transform: scaleY(1); }
        5% { transform: scaleY(0.1); }
      }
      @keyframes sweep-lean {
        0%, 100% { transform: rotate(5deg) translate(1px, 0); }
        50% { transform: rotate(15deg) translate(3px, 1px); }
      }
      @keyframes sweep-arm {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(-20deg); }
      }
      @keyframes sweep-broom {
        0%, 100% { transform: rotate(10deg); }
        50% { transform: rotate(30deg) translate(2px, -1px); }
      }
      @keyframes sweep-dust {
        0%, 40% { transform: translate(17px, 14px) scale(0); opacity: 0; }
        50% { transform: translate(19px, 14px) scale(1); opacity: 1; }
        100% { transform: translate(25px, 14px) scale(0.5); opacity: 0; }
      }
    </style>
  </defs>

  <!-- Mirrored: entire scene flipped so character sweeps leftward -->
  <g transform="translate(15, 0) scale(-1, 1)">
    <g id="shadow-js">
      <rect x="3" y="16" width="9" height="1" fill="#000000" opacity="0.5"/>
    </g>

    <g id="body-js">
      <g class="body-sweep">
        <g class="breathe-anim">

          <!-- Tail -->
          <rect x="1" y="7" width="2" height="5" fill="#C46A0A"/>
          <rect x="-1" y="7" width="2" height="5" fill="#C46A0A"/>
          <rect x="0" y="8" width="3" height="5" fill="#C46A0A"/>
          <rect x="-1" y="6" width="2" height="3" fill="#FAEBD7"/>

          <!-- Left Ear -->
          <rect x="3" y="4" width="1" height="2" fill="#E8710A"/>
          <rect x="4" y="4.5" width="1" height="2" fill="#E8710A"/>
          <rect x="5" y="5" width="1.3" height="1" fill="#E8710A"/>
          <polygon points="3,4 4,3 6.5,6" fill="#E8710A"/>
          <polygon points="4,6 4,4.5 5,6" fill="#FAEBD7"/>

          <!-- Right Ear -->
          <rect x="9" y="5" width="1" height="1" fill="#E8710A"/>
          <rect x="10" y="3" width="1" height="3" fill="#E8710A"/>
          <rect x="11" y="4" width="1" height="2" fill="#E8710A"/>
          <polygon points="11,3 11,4 12,4" fill="#E8710A"/>
          <polygon points="8,6 10,6 10,3" fill="#E8710A"/>
          <polygon points="11,4 12,4 11,5" fill="#E8710A"/>
          <polygon points="10,6 11,6 10.5,4" fill="#FAEBD7"/>

          <!-- Body (fox) -->
          <rect x="3" y="6" width="9" height="7" fill="#E8710A"/>

          <!-- Arms -->
          <rect x="1" y="9" width="2" height="2" fill="#E8710A" transform="translate(6, 1) rotate(-15 1 10)"/>
          <g class="arm-sweep"><rect x="12" y="9" width="2" height="2" fill="#E8710A"/></g>

          <!-- Legs -->
          <rect x="4" y="13" width="2" height="2" fill="#E8710A"/>
          <rect x="9" y="13" width="2" height="2" fill="#E8710A"/>

          <!-- Eyes -->
          <g id="eyes-js" fill="#000000">
            <g class="eyes-blink">
              <rect x="5" y="8" width="1" height="2"/>
              <rect x="10" y="8" width="1" height="2"/>
            </g>
          </g>

        </g>
      </g>
    </g>

    <g class="broom">
      <rect x="13.5" y="4" width="1" height="10" fill="#795548"/>
      <rect x="12" y="14" width="4" height="2" fill="#FFC107"/>
    </g>

    <g class="dust" fill="#9E9E9E">
      <rect x="0" y="0" width="1.5" height="1.5"/>
    </g>
    <g class="dust d1" fill="#B0BEC5">
      <rect x="0" y="0" width="1" height="1"/>
    </g>
  </g>
</svg>
