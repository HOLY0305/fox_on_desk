<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* Straining body trembling and squashing under weight */
      .body-carry {
        transform-origin: 7.5px 15px; /* Pivot at the base of the feet */
        animation: carry-strain 0.15s infinite alternate ease-in-out;
      }

      /* Heavy Data Block shaking */
      .data-block {
        animation: block-shake 0.15s infinite alternate ease-in-out;
      }

      /* Trembling legs */
      .leg {
        transform-box: fill-box;
        transform-origin: top center;
      }
      .leg-1 { animation: tremble-1 0.1s infinite linear; }
      .leg-2 { animation: tremble-2 0.1s infinite linear; }

      /* Sweat drop flying off */
      .sweat {
        opacity: 0;
        animation: sweat-fly 2s infinite cubic-bezier(.25,.1,.25,1);
      }

      /* Ground shadow shifting */
      .shadow-carry {
        transform-origin: 7.5px 15.5px;
        animation: shadow-strain 0.15s infinite alternate ease-in-out;
      }

      /* Keyframes */
      @keyframes carry-strain {
        0% { transform: translateY(1px) scale(1.05, 0.95); }
        100% { transform: translateY(2px) scale(1.08, 0.92); } /* Heavy squash */
      }

      @keyframes shadow-strain {
        0% { transform: scale(1.1); opacity: 0.6; }
        100% { transform: scale(1.15); opacity: 0.7; }
      }

      @keyframes block-shake {
        0% { transform: translate(0, 0) rotate(-0.5deg); }
        100% { transform: translate(0, 1px) rotate(0.5deg); }
      }

      /* Trembling legs under weight */
      @keyframes tremble-1 {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(-0.5px); }
      }
      @keyframes tremble-2 {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(0.5px); }
      }

      /* Sweat drop flies back and fades */
      @keyframes sweat-fly {
        0% { transform: translate(0, 0) scale(0); opacity: 0; }
        10% { transform: translate(0, 0) scale(1); opacity: 1; }
        40% { transform: translate(-8px, -4px) scale(0.8); opacity: 0; }
        100% { opacity: 0; }
      }

      .breathe-anim {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }
      #eyes-js, #body-js, #shadow-js {
        transition: transform 0.2s ease-out;
      }
      #shadow-js {
        transform-origin: 7.5px 15px;
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }
    </style>
  </defs>

  <!-- Mirrored: entire scene flipped -->
  <g transform="translate(15, 0) scale(-1, 1)">
    <g id="shadow-js">
      <rect id="ground-shadow" class="shadow-carry" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>
    </g>

    <g id="body-js" class="body-carry">
      <g class="breathe-anim">

        <!-- Tail -->
        <rect x="1" y="7" width="2" height="5" fill="#C46A0A"/>
        <rect x="-1" y="7" width="2" height="5" fill="#C46A0A"/>
        <rect x="0" y="8" width="3" height="5" fill="#C46A0A"/>
        <rect x="-1" y="6" width="2" height="3" fill="#FAEBD7"/>

        <!-- Right Ear -->
        <rect x="9" y="5" width="1" height="1" fill="#E8710A"/>
        <rect x="10" y="3" width="1" height="3" fill="#E8710A"/>
        <rect x="11" y="4" width="1" height="2" fill="#E8710A"/>
        <polygon points="11,3 11,4 12,4" fill="#E8710A"/>
        <polygon points="8,6 10,6 10,3" fill="#E8710A"/>
        <polygon points="11,4 12,4 11,5" fill="#E8710A"/>
        <polygon points="10,6 11,6 10.5,4" fill="#FAEBD7"/>

        <!-- Body -->
        <g id="body-color-group" fill="#E8710A">
          <rect class="leg leg-1" x="4" y="13" width="2" height="2"/>
          <rect class="leg leg-2" x="9" y="13" width="2" height="2"/>
          <rect id="torso" x="3" y="6" width="9" height="7"/>
          <rect id="left-arm" x="1" y="4" width="2" height="4"/>
          <rect id="right-arm" x="12" y="4" width="2" height="4"/>
        </g>

        <!-- Eyes -->
        <g id="eyes-js" fill="#000000">
          <rect id="left-eye" x="5" y="7.5" width="1" height="2"/>
          <rect id="right-eye" x="10" y="7.5" width="1" height="2"/>
        </g>

        <!-- Data Block (画在最上层，但不遮挡耳朵和脸部) -->
        <g transform="translate(1, -4)">
        <g class="data-block">
          <rect x="0" y="0" width="13" height="9" fill="#90A4AE"/>
          <rect x="1" y="1" width="11" height="7" fill="#CFD8DC"/>
          <rect x="2" y="2" width="2" height="2" fill="#0082FC"/>
          <rect x="9" y="2" width="2" height="2" fill="#FFC107"/>
          <rect x="3" y="5" width="7" height="2" fill="#B0BEC5"/>
        </g>
        </g>

        <!-- Left Ear (盖在数据块上面) -->
        <rect x="3" y="4" width="1" height="2" fill="#E8710A"/>
        <rect x="4" y="4.5" width="1" height="2" fill="#E8710A"/>
        <rect x="5" y="5" width="1.3" height="1" fill="#E8710A"/>
        <polygon points="3,4 4,3 6.5,6" fill="#E8710A"/>
        <polygon points="4,6 4,4.5 5,6" fill="#FAEBD7"/>

        <!-- Sweat -->
        <g transform="translate(-1, 5)">
          <g class="sweat" fill="#40C4FF">
            <rect x="0" y="1" width="1.5" height="1.5"/>
            <rect x="0.25" y="0" width="1" height="1"/>
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>
