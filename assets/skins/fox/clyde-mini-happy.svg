<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .breathe-anim {
        transform-origin: 7.5px 13px;
        animation: breathe 3.2s infinite ease-in-out;
      }

      .arm-happy {
        transform-origin: 2px 9px;
        animation: arm-happy-wave 0.4s infinite alternate ease-in-out;
      }

      .eyes-happy-blink {
        transform-origin: 7.5px 9px;
        animation: happy-blink 3s infinite ease-in-out;
      }

      .spark-center {
        opacity: 0;
        animation: flash-center 1.5s infinite step-end;
        animation-delay: var(--delay, 0s);
      }
      .spark-outer {
        opacity: 0;
        animation: flash-outer 1.5s infinite step-end;
        animation-delay: var(--delay, 0s);
      }

      #eyes-js, #body-js, #shadow-js {
        transition: transform 0.2s ease-out;
      }
      #shadow-js {
        transform-origin: 7.5px 15px;
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }

      @keyframes arm-happy-wave {
        0% { transform: rotate(22deg); }
        100% { transform: rotate(-8deg); }
      }

      @keyframes happy-blink {
        0%, 12%, 30%, 42%, 100% { transform: scaleY(1); }
        6% { transform: scaleY(0.1); }
        36% { transform: scaleY(0.1); }
      }

      @keyframes flash-center {
        0%  { opacity: 0; }
        10% { opacity: 1; }
        30% { opacity: 0; }
        100%{ opacity: 0; }
      }
      @keyframes flash-outer {
        0%  { opacity: 0; }
        20% { opacity: 1; }
        40% { opacity: 0; }
        100%{ opacity: 0; }
      }
    </style>

    <g id="px-sparkle">
      <rect class="spark-center" x="-0.5" y="-0.5" width="1" height="1" />
      <path class="spark-outer" d="M -0.5,-1.5 h1 v1 h-1 z
                                   M -0.5,0.5 h1 v1 h-1 z
                                   M -1.5,-0.5 h1 v1 h-1 z
                                   M 0.5,-0.5 h1 v1 h-1 z" />
    </g>
  </defs>

  <g id="shadow-js">
    <rect x="3" y="16" width="9" height="1" fill="#000000" opacity="0.5"/>
  </g>

  <g transform="rotate(-12, 7.5, 15)">
    <g id="body-js">
      <g class="breathe-anim">

        <!-- Tail -->
        <rect x="1" y="7" width="2" height="5" fill="#C46A0A"/>
        <rect x="-1" y="7" width="2" height="5" fill="#C46A0A"/>
        <rect x="0" y="8" width="3" height="5" fill="#C46A0A"/>
        <rect x="-1" y="6" width="2" height="3" fill="#FAEBD7"/>

        <!-- Left Ear -->
        <rect x="3" y="4" width="1" height="2" fill="#E8710A"/>
        <rect x="4" y="4.5" width="1" height="2" fill="#E8710A"/>
        <rect x="5" y="5" width="1.3" height="1" fill="#E8710A"/>
        <polygon points="3,4 4,3 6.5,6" fill="#E8710A"/>
        <polygon points="4,6 4,4.5 5,6" fill="#FAEBD7"/>

        <!-- Right Ear -->
        <rect x="9" y="5" width="1" height="1" fill="#E8710A"/>
        <rect x="10" y="3" width="1" height="3" fill="#E8710A"/>
        <rect x="11" y="4" width="1" height="2" fill="#E8710A"/>
        <polygon points="11,3 11,4 12,4" fill="#E8710A"/>
        <polygon points="8,6 10,6 10,3" fill="#E8710A"/>
        <polygon points="11,4 12,4 11,5" fill="#E8710A"/>
        <polygon points="10,6 11,6 10.5,4" fill="#FAEBD7"/>

        <!-- Torso -->
        <rect x="3" y="6" width="9" height="7" fill="#E8710A"/>

        <!-- Left Arm (happy wave + flower) -->
        <g class="arm-happy">
          <rect x="0" y="9" width="3" height="2" fill="#E8710A"/>
          <rect x="0" y="6" width="0.5" height="3" fill="#000000"/>
          <rect x="-1" y="5" width="0.8" height="0.8" fill="#FFD700"/>
          <rect x="1" y="5" width="0.8" height="0.8" fill="#FFD700"/>
          <rect x="0" y="4.2" width="0.8" height="0.8" fill="#FFD700"/>
          <rect x="0" y="5.8" width="0.8" height="0.8" fill="#FFD700"/>
          <rect x="0" y="5" width="0.8" height="0.8" fill="#FFA000"/>
        </g>

        <!-- Right Arm -->
        <rect x="12" y="9" width="2" height="2" fill="#E8710A"/>

        <!-- Legs -->
        <rect x="4" y="13" width="2" height="2" fill="#E8710A"/>
        <rect x="9" y="13" width="2" height="2" fill="#E8710A"/>

        <!-- Eyes ^^ happy squint -->
        <g id="eyes-js">
          <g class="eyes-happy-blink">
            <g fill="none" stroke="#000000" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="4.5,9 5.5,8 6.5,9"/>
              <polyline points="9.5,9 10.5,8 11.5,9"/>
            </g>
          </g>
        </g>

      </g>
    </g>
  </g>

  <!-- Sparkles -->
  <use href="#px-sparkle" x="-3" y="0"  fill="#FFD700" style="--delay: 0s"/>
  <use href="#px-sparkle" x="-6" y="6"  fill="#FFA000" style="--delay: 0.4s"/>
  <use href="#px-sparkle" x="0"  y="-5" fill="#FFF59D" style="--delay: 0.8s"/>
</svg>
